name: Luna nightly

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  luna-nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Luna nightly suite (full)
        run: npm run luna:nightly

      - name: Upload nightly report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: luna-nightly-report
          path: reports/luna-nightly/
          retention-days: 14
